---
- name: Veteran PC
  hosts: localhost
  become: yes
  vars_files:
    - vars.yml

  tasks:

    - name: Disable SELinux
      lineinfile:
        path: /etc/selinux/config
        regexp: '^SELINUX='
        line: 'SELINUX=disabled'

    - name: Install RPM Fusion
      dnf:
        name:
          - "https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-{{ ansible_distribution_major_version }}.noarch.rpm"
          - "https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-{{ ansible_distribution_major_version }}.noarch.rpm"
        state: latest
        disable_gpg_check: yes

    - name: Install drivers
      dnf:
        name:
          - mesa-va-drivers-freeworld
          - mesa-va-drivers-freeworld.i686
          - mesa-vdpau-drivers-freeworld
          - mesa-vdpau-drivers-freeworld.i686  
          - mesa-dri-drivers
          - mesa-dri-drivers.i686
          - libva-vdpau-driver
          - xorg-x11-drv-nouveau
        state: latest

    - name: Install RPMs
      dnf:
        name:
          - "{{ gnome }}"
          - "{{ standart_rpms }}"
          - flatpak
        state: latest
        disable_gpg_check: true

    - name: Enable irqbalance
      systemd:
        name: irqbalance
        enabled: yes
        state: started

    - name: Enable GDM
      systemd:
        name: gdm
        enabled: yes

    - name: Set graphical.target as default
      systemd:
        name: graphical.target
        enabled: yes
        masked: no

    - name: Enable fstrim.timer
      systemd:
        name: fstrim.timer
        enabled: yes
        state: started

    - name: Add Flatpak repo
      community.general.flatpak_remote:
        name: flathub
        state: present
        flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo
        method: system

    - name: Install Flatpaks
      community.general.flatpak:
        method: system
        name: 
          - "{{ standart_flatpaks }}"
          - dev.vencord.Vesktop
        state: latest

    - name: Install WHLs
      become: no
      shell: pipx install gnome-extensions-cli yt-dlp

    - name: Install GNOME extensions
      become: no
      shell: dbus-run-session ~/.local/bin/gnome-extensions-cli install {{ item }}
      loop:
        - dash-to-panel@jderose9.github.com
        - appindicatorsupport@rgcjonas.gmail.com
        - arcmenu@arcmenu.com
        - ding@rastersoft.com
        - user-theme@gnome-shell-extensions.gcampax.github.com

    - name: Recursively copy rootfs directory into root
      copy:
        src: "./rootfs/oldpc/"
        dest: "/"

    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Make autoupdate.sh executable
      file:
        path: /usr/local/bin/autoupdate.sh
        mode: '0755'

    - name: Enable packages autoupdate at startup and every 3 hours 
      systemd:
        name: autoupdate.timer
        enabled: yes
        state: started

    - name: Install OhMyPosh
      become: no
      shell: curl -s https://ohmyposh.dev/install.sh | bash -s

    - name: Download a Nerd Font
      become: no
      shell: oh-my-posh font install UbuntuMono --headless

    - name: Load dconf config
      become: no
      shell: dbus-run-session dconf load / < /tmp/settings.dconf

    - name: Enable Plymouth and disable SELinux in GRUB
      replace:
        path: /etc/default/grub
        regexp: '^(GRUB_CMDLINE_LINUX=")((?:(?!rhgb quiet selinux=0).)*)(")$'
        replace: '\1\2 rhgb quiet selinux=0 amd_iommu=on nouveau.modeset=1\3'

    - name: Update GRUB configuration
      shell: grub2-mkconfig -o /etc/grub2.cfg

    - name: Reboot 
      shell: "sleep 5 && reboot"
      async: 1
      poll: 0
      ignore_errors: true

