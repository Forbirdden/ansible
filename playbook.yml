---
- name: Forbirdden Fedora
  hosts: localhost
  become: yes

  tasks:

    - name: Install RPM Fusion
      dnf:
        name:
          - "https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-{{ ansible_distribution_major_version }}.noarch.rpm"
          - "https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-{{ ansible_distribution_major_version }}.noarch.rpm"
        state: present
        disable_gpg_check: yes

    - name: Install drivers
      dnf:
        name:
          - linux-firmware
          - kernel-modules-extra
          - mesa-vulkan-drivers
          - mesa-vulkan-drivers.i686
      	  - mesa-va-drivers
          - mesa-va-drivers.i686 
        state: present

    - name: Install RPMs
      dnf:
        name:
          - flatpak
          - gnome-shell
          - gdm
          - nautilus
          - gnome-terminal
          - gnome-control-center
          - gnome-software
          - gnome-tweaks
          - nemo
          - nemo-extensions
          - pipx
          - curl
          - unzip
          - dbus-x11
        state: present

    - name: Enable GDM
      systemd:
        name: gdm
        enabled: yes

    - name: Set GDM as default target
      file:
        src: /lib/systemd/system/graphical.target
        dest: /etc/systemd/system/default.target
        state: link

    - name: Add Flatpak repo
      community.general.flatpak_remote:
        name: flathub
        state: present
        flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo
        method: system

    - name: Install Flatpaks
      community.general.flatpak:
        method: system
        name: 
          - com.discordapp.Discord
          - com.google.Chrome
          - org.vinegarhq.Sober
          - com.usebottles.bottles
          - org.telegram.desktop
          - org.videolan.VLC
          - com.github.tchx84.Flatseal
          - com.obsproject.Studio
          - com.visualstudio.code
          - com.mattjakeman.ExtensionManager
          - org.qbittorrent.qBittorrent
          - org.libreoffice.LibreOffice
          - com.protonvpn.www
          - io.github.flattool.Warehouse
          - org.torproject.torbrowser-launcher
          - io.missioncenter.MissionCenter
          - com.anydesk.Anydesk
          - im.riot.Riot
          - io.github.thetumultuousunicornofdarkness.cpu-x
          - dev.lizardbyte.app.Sunshine
          - org.virt_manager.virt-manager
          - io.github.shiftey.Desktop
          - org.kde.kate
          - org.raspberrypi.rpi-imager
        state: present

    - name: Install WHLs
      become: no
      shell: |
        pipx install gnome-extensions-cli yt-dlp --force
        pipx ensurepath

    - name: Install GNOME extensions
      become: no
      shell: |
        dbus-run-session ~/.local/bin/gnome-extensions-cli install {{ item }}
      loop:
        - dash-to-panel@jderose9.github.com
        - appindicatorsupport@rgcjonas.gmail.com
        - arcmenu@arcmenu.com
        - ding@rastersoft.com
        - gsconnect@andyholmes.github.io

    - name: Recursively copy rootfs directory into root
      ansible.builtin.copy:
        src: "./rootfs/"
        dest: "/"

    - name: Load configuration
      become: no
      shell: |
        dbus-run-session dconf load / < /tmp/settings.dconf

    - name: Reboot
      shell: "sleep 5 && reboot"
      async: 1
      poll: 0
      ignore_errors: true

